kind = "web"
previewPath = "/"
title = "Internal Operations Platform"
version = "1.0.0"
id = "artifacts/ops-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23761

[services.development]
run = "pnpm --filter @workspace/ops-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ops-platform", "run", "build" ]
publicDir = "artifacts/ops-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23761"
BASE_PATH = "/"
