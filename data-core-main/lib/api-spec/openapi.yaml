  /workflows/comparative:
    get:
      operationId: getWorkflowComparative
      tags: [workflows]
      summary: Cross-workflow comparative intelligence & risk ranking for the workspace (P8-E)
      description: |
        Runs the full P8-A → P8-D intelligence stack for every active workflow
        in the authenticated workspace, then feeds all results into the P8-E
        comparative-intelligence engine to produce a workspace-level risk ranking.

        For each workflow the engine computes:
          • comparativeRiskScore (0–100) — blend of rWC + projected complexity +
            trend bonus + fragility bonus + hotspot bonus × confidence multiplier
          • workspaceRank — 1-based rank within the workspace (1 = highest risk)
          • operationalPriority — informational | watch | elevated | urgent | critical
          • trendDirection, fragilityLevel, confidenceLevel — from P8-C / P8-D

        Workspace-level analytics:
          • WorkspaceHotspotConcentration — dominant workflow count, concentration
            ratio, chronic hotspot count, critically-degrading count

        comparativeRiskScore formula:
          base = rWC × 0.35 + projectedComplexity × 0.25   (max 60)
          trendBonus: critically_degrading=20 | degrading=10 | stable=0 | improving=-5
          fragilityBonus: critical=15 | high=10 | moderate=5 | low=0
          hotspotBonus: min(hotspotCount × 1.0, 5)
          confidenceMultiplier: high=1.0 | moderate=0.90 | low=0.80
          score = clamp(round(subtotal × multiplier), 0, 100)

        Ranking semantics:
          Sort: comparativeRiskScore DESC. Tie-break: workflowId ASC.
          Escalation: critically_degrading trend OR critical fragility → +1 priority level.

        READ-ONLY — never mutates workflow definitions, governance history, or executions.
        Deterministic comparative analytics only — no autonomous actions, no ML.
      responses:
        "200":
          description: Cross-workflow comparative intelligence ranking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowComparativeRankingResponse"
  /workflows/governance/signals:
    get:
      operationId: getWorkflowGovernanceSignals
      tags: [workflows]
      summary: Proactive governance advisory signals for the workspace (P8-F)
      description: |
        Runs the full P8-A → P8-D intelligence pipeline per workflow, builds the
        P8-E comparative ranking, then feeds all results into the P8-F governance
        signal engine to produce deterministic proactive advisory signals.

        Signal codes emitted:
          GOV-WORKFLOW-CRITICAL      — operationalPriority = "critical"
          GOV-WORKFLOW-URGENT        — operationalPriority = "urgent"
          GOV-WORKFLOW-ESCALATING    — trendDirection = "critically_degrading"
          GOV-FRAGILITY-GROWTH       — fragilityLevel ∈ {high, critical}
          GOV-HOTSPOT-CONCENTRATION  — workspace concentrationRatio > 0.25
          GOV-STORM-RISK-GROWTH      — projectedStormRisk > 0.15 (from P8-D)

        Deduplication:
          Each (signalCode, workflowId, workspaceId) fingerprint is emitted at
          most once per evaluation. Caller may supply priorSignalFingerprints
          for external cooldown window enforcement.

        Advisory level (worst severity across all signals):
          critical signals → critical
          high signals     → urgent
          medium signals   → elevated
          low signals      → advisory
          no signals       → informational

        Signal TTL (expiresAt per code):
          GOV-WORKFLOW-CRITICAL:       60 min
          GOV-WORKFLOW-URGENT:        120 min
          GOV-WORKFLOW-ESCALATING:    240 min
          GOV-FRAGILITY-GROWTH:       360 min
          GOV-HOTSPOT-CONCENTRATION:  240 min
          GOV-STORM-RISK-GROWTH:      480 min

        ADVISORY-ONLY — never mutates workflow definitions, never blocks executions,
        never triggers autonomous remediation.
        Deterministic: identical operational state → identical signals.
      responses:
        "200":
          description: Workspace governance advisory signals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowGovernanceSignalResponse"
  /workflows/{id}/forecast:
    get:
      operationId: getWorkflowForecast
      tags: [workflows]
      summary: Deterministic operational trend forecast for a workflow (P8-D)
      description: |
        Projects future operational complexity and fragility for a workflow definition
        using deterministic statistical methods applied to historical governance rollup data.

        Projection methods (selected automatically based on data availability):
          • no_data                   — no rollup history; returns structural baseline
          • last_known_value          — 1 data point; no extrapolation
          • weighted_moving_average   — 2–6 data points; triangular-weighted slope
          • weighted_linear_regression — ≥ 7 data points; full WLS slope extrapolation

        Confidence levels:
          • low      — fewer than 7 data points, or high volatility, or window > 14 days
          • moderate — 7–13 data points (before volatility/window penalties)
          • high     — ≥ 14 data points with low volatility and window ≤ 14 days

        Trend directions: improving | stable | degrading | critically_degrading

        READ-ONLY — never mutates governance history, triggers alerts, or invokes execution.
        Assistive deterministic forecasting only — no autonomous actions, no ML.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
        - name: window
          in: query
          required: false
          description: "Forecast window in days (1–90, default 7)"
          schema: { type: integer, default: 7, minimum: 1, maximum: 90 }
        - name: granularity
          in: query
          required: false
          description: "Rollup granularity to query: 'daily' (30 days) or 'hourly' (7 days)"
          schema: { type: string, enum: [daily, hourly], default: daily }
      responses:
        "200":
          description: Operational trend forecast
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowForecastResponse"
        "404":
          description: Workflow not found
  /workflows/{id}/operational:
    get:
      operationId: getWorkflowOperational
      tags: [workflows]
      summary: Runtime-weighted operational intelligence for a workflow (P8-C)
      description: |
        Correlates P8-B static dependency analysis with aggregated historical
        governance snapshot data (last 7 days of hourly rollups) to produce:
          • 5 runtime pressure metrics (historicalErrorPressure, historicalBacklogPressure,
            approvalLatencyPressure, delayDurationPressure, executionFailurePressure)
          • runtimeWeightedComplexity — static × historical blend (0–100)
          • correlationClassification — structural vs operational 2×2 matrix
          • chronicOperationalHotspots — named hotspot categories
          • OperationalFragilityIndex — level + structural/runtime/chronicity components

        Falls back to pure structural analysis if no governance rollup data exists.

        READ-ONLY — never mutates governance history, workflow definitions, or DB.
        Never triggers execution or invokes the scheduler.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Operational correlation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowOperationalResponse"
        "404":
          description: Workflow not found
  /workflows/{id}/dependency:
    get:
      operationId: getWorkflowDependency
      tags: [workflows]
      summary: Dependency intelligence analysis for a workflow (P8-B)
      description: |
        Builds on the P8-A topology graph to expose:
          • convergenceNodes — where ≥2 execution paths merge
          • divergenceNodes  — where execution paths split (branching nodes)
          • bottleneckNodes  — high fan-in / approval / delay concentration points
          • synchronizationCandidates — convergence points with blocking predecessors
          • executionPressure — 5 normalized metrics + composite 0–100 score
          • dependencyRisk   — low/moderate/high/critical with frailty indicators

        READ-ONLY — never mutates the workflow definition, never triggers
        execution, never invokes the scheduler.

        Requires admin role or workflow.view permission.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Dependency analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowDependencyResponse"
        "404":
          description: Workflow not found
  /workflows/{id}/topology:
    get:
      operationId: getWorkflowTopology
      tags: [workflows]
      summary: Static topology analysis for a workflow (P8-A)
      description: |
        Extracts the structural topology graph from a workflow definition
        and returns: node/edge graph, classified node sets (branching, approval,
        delay, unreachable, isolated), structural analytics (complexity metrics),
        and a deterministic risk assessment.

        READ-ONLY — never mutates the workflow definition, never triggers
        execution, never invokes the scheduler.

        Requires admin role or workflow.view permission.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Topology analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowTopologyResponse"
        "404":
          description: Workflow not found
  /workflows/{id}/activate:
    post:
      operationId: activateWorkflow
      tags: [workflows]
      summary: Publish a workflow (governance-safe activation)
      description: |
        P5-E: Activation is now an immutable publish operation.

        Runs governance validation then — if all checks pass — atomically:
          1. Writes an IMMUTABLE row to workflow_definition_versions.
          2. Closes the previous active version row (deactivated_at = now).
          3. Updates the definition: status=active, version++, currentVersionId.

        Returns publish metadata: version number, versionId, publishedAt.
        The version history is append-only — version rows are never deleted.

        If validation fails (governance errors), returns 422. No version row is
        written. Admin must fix all errors before re-attempting.

        Idempotent: publishing an already-active workflow returns 200 with
        alreadyActive=true (no new version written).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishWorkflowBody"
      responses:
        "200":
          description: Workflow published (or already active)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowPublishResult"
        "404":
          description: Workflow not found
        "422":
          description: Validation failed — workflow not published
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/WorkflowPublishResult"
                  - type: object
                    properties:
                      error:
                        type: string
  /workflows/{id}/versions:
    get:
      operationId: listWorkflowVersions
      tags: [workflows]
      summary: List publish history for a workflow
      description: |
        Returns the immutable version history for a workflow definition.
        Each record represents one publish event — who published, when, with
        what notes, and when (if ever) it was superseded.
        Ordered by version number descending (most recent first).
      parameters:
