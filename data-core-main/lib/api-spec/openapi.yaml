openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Internal Operations Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: auth
    description: Authentication and session
  - name: calendar
    description: Calendar & meeting management
  - name: health
    description: Health operations
  - name: workspaces
    description: Workspace management
  - name: invitations
    description: User invitations
  - name: departments
    description: Department management
  - name: users
    description: User management
  - name: messages
    description: Internal messaging
  - name: groups
    description: Group management
  - name: tickets
    description: Ticket management
  - name: comments
    description: Ticket comments
  - name: notifications
    description: Notifications
  - name: approvals
    description: Approval workflows
  - name: activity
    description: Activity timeline
  - name: dashboard
    description: Dashboard summary
  - name: platform
    description: Platform super-admin operations
  - name: roles
    description: Workspace role and permission management
  - name: hr
    description: Human Resources — employees, services, approvals and onboarding
  - name: Storage
    description: Object storage upload and serving endpoints.

paths:
  /setup/status:
    get:
      operationId: getSetupStatus
      tags: [setup]
      summary: Check whether the platform has been initialized (public)
      responses:
        "200":
          description: Setup status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupStatus"

  /setup/initialize:
    post:
      operationId: initializePlatform
      tags: [setup]
      summary: Create the first super_admin account (one-time, public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupInitializeBody"
      responses:
        "201":
          description: Owner account created; returns access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupInitializeResponse"
        "400":
          description: Validation error
        "409":
          description: Platform already initialized

  /auth/login:
    post:
      operationId: authLogin
      tags: [auth]
      summary: Employee number + password login (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginBody"
      responses:
        "200":
          description: JWT access token and user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"
        "400":
          description: Validation error
        "401":
          description: Invalid credentials
        "429":
          description: Rate limited

  /auth/logout:
    post:
      operationId: authLogout
      tags: [auth]
      summary: Client-side logout acknowledgement (public)
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLogoutResponse"

  /auth/me:
    get:
      operationId: getAuthMe
      tags: [auth]
      summary: Current authenticated user profile
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionUser"
        "401":
          description: Unauthorized

  /auth/change-password:
    post:
      operationId: authChangePassword
      tags: [auth]
      summary: Change own password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthChangePasswordBody"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Validation error
        "401":
          description: Unauthorized

  /auth/me/profile:
    patch:
      operationId: patchAuthMeProfile
      tags: [auth]
      summary: Super admin self-service profile update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthMeProfilePatchBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeProfilePatchResponse"
        "400":
          description: Validation error
        "403":
          description: Super admin only

  /auth/me/email:
    patch:
      operationId: patchAuthMeEmail
      tags: [auth]
      summary: Super admin self-service email update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthMeEmailPatchBody"
      responses:
        "200":
          description: Email updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeEmailPatchResponse"
        "400":
          description: Validation error
        "401":
          description: Invalid current password
        "409":
          description: Duplicate email

  /auth/reset-password:
    post:
      operationId: authResetPassword
      tags: [auth]
      summary: Admin resets another user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthResetPasswordBody"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
        "404":
          description: User not found

  /auth/lookup:
    post:
      operationId: authLookup
      deprecated: true
      tags: [auth]
      summary: "[Removed] Legacy Clerk lookup — not implemented on API server"
      description: Deprecated. Use POST /auth/login instead.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLookupBody"
      responses:
        "410":
          description: Endpoint removed

  /auth/verify:
    post:
      operationId: authVerify
      deprecated: true
      tags: [auth]
      summary: "[Removed] Legacy Clerk verify — not implemented on API server"
      description: Deprecated. Use POST /auth/login instead.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthVerifyBody"
      responses:
        "410":
          description: Endpoint removed

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Workspaces
  /workspaces:
    get:
      operationId: listWorkspaces
      tags: [workspaces]
      summary: List all workspaces (super_admin only)
      responses:
        "200":
          description: List of workspaces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Workspace"
    post:
      operationId: createWorkspace
      tags: [workspaces]
      summary: Create a workspace (super_admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceBody"
      responses:
        "201":
          description: Created workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"

  /workspaces/me:
    get:
      operationId: getMyWorkspace
      tags: [workspaces]
      summary: Get the current user's workspace
      responses:
        "200":
          description: Current workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
    patch:
      operationId: updateMyWorkspace
      tags: [workspaces]
      summary: Update the current workspace settings (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceBody"
      responses:
        "200":
          description: Updated workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"

  /workspaces/{id}:
    get:
      operationId: getWorkspace
      tags: [workspaces]
      summary: Get a workspace by ID (super_admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workspace details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
    patch:
      operationId: updateWorkspace
      tags: [workspaces]
      summary: Update a workspace (super_admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceAdminBody"
      responses:
        "200":
          description: Updated workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Workspace"
    delete:
      operationId: deleteWorkspace
      tags: [workspaces]
      summary: Delete a workspace (super_admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Workspace deleted

  /workspaces/{id}/stats:
    get:
      operationId: getWorkspaceStats
      tags: [workspaces]
      summary: Get workspace statistics (super_admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Workspace statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceStats"

  /workspaces/{id}/users:
    get:
      operationId: getWorkspaceUsers
      tags: [workspaces]
      summary: Get users in a workspace (super_admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Users in workspace
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /platform/stats:
    get:
      operationId: getPlatformStats
      tags: [platform]
      summary: Get platform-wide statistics (super_admin only)
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  /platform/overview/activity:
    get:
      operationId: getPlatformActivity
      tags: [platform]
      summary: Get recent platform activity for overview dashboard (super_admin only)
      responses:
        "200":
          description: Platform activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformActivity"

  /platform/settings:
    get:
      operationId: getPlatformSettings
      tags: [platform]
      summary: Get all platform settings (super_admin only)
      responses:
        "200":
          description: All platform settings grouped by category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSettings"

  /platform/settings/{category}:
    patch:
      operationId: updatePlatformSettings
      tags: [platform]
      summary: Update platform settings for a category (super_admin only)
      parameters:
        - name: category
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Updated platform settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSettings"

  /platform/me:
    get:
      operationId: getPlatformMe
      tags: [platform]
      summary: Current platform user context (super-admin self-service)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Platform user profile with effective permissions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformMe"
        "403":
          description: Not a platform user

  /platform/me/profile:
    patch:
      operationId: patchPlatformMeProfile
      tags: [platform]
      summary: Update own platform profile fields
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformMeProfileUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  profile:
                    type: object
                    additionalProperties: true

  /platform/me/email:
    patch:
      operationId: patchPlatformMeEmail
      tags: [platform]
      summary: Change own platform login email
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformMeEmailUpdate"
      responses:
        "200":
          description: Email updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  email: { type: string }

  /platform/me/change-password:
    post:
      operationId: changePlatformMePassword
      tags: [platform]
      summary: Change own platform password
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformMeChangePasswordInput"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }

  /platform/users:
    get:
      operationId: listPlatformUsers
      tags: [platform]
      summary: List platform directory users
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: userType
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, default: 25 }
      responses:
        "200":
          description: Paginated platform users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformUserListResponse"
    post:
      operationId: createPlatformUser
      tags: [platform]
      summary: Create platform directory user
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformUserResponse"

  /platform/users/{userId}:
    get:
      operationId: getPlatformUser
      tags: [platform]
      summary: Get platform user by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/PlatformUserIdPath"
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformUserResponse"
        "404":
          description: Not found
    patch:
      operationId: updatePlatformUser
      tags: [platform]
      summary: Update platform user directory fields
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/PlatformUserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformUserResponse"

  /platform/users/{userId}/status:
    patch:
      operationId: updatePlatformUserStatus
      tags: [platform]
      summary: Activate or suspend platform user
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/PlatformUserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformUserResponse"

  /platform/users/{userId}/role:
    patch:
      operationId: updatePlatformUserRole
      tags: [platform]
      summary: Change platform user role assignment
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/PlatformUserIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformUserResponse"

  /platform/tenants:
    get:
      operationId: listPlatformTenants
      tags: [platform]
      summary: List tenant registry profiles
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: subscriptionStatus
          schema: { type: string }
        - in: query
          name: riskLevel
          schema: { type: string }
        - in: query
          name: search
          schema: { type: string }
      responses:
        "200":
          description: Tenant list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformTenantListResponse"

  /platform/tenants/{tenantId}:
    get:
      operationId: getPlatformTenant
      tags: [platform]
      summary: Get tenant profile by workspace ID
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/TenantIdPath"
      responses:
        "200":
          description: Tenant profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformTenantResponse"
        "404":
          description: Not found

  /platform/tenants/{tenantId}/summary:
    get:
      operationId: getPlatformTenantSummary
      tags: [platform]
      summary: Lightweight tenant summary
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/TenantIdPath"
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /platform/tenants/{tenantId}/lifecycle:
    patch:
      operationId: patchPlatformTenantLifecycle
      tags: [platform]
      summary: Controlled tenant lifecycle transition
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/TenantIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlatformTenantLifecycleInput"
      responses:
        "200":
          description: Transition applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformTenantLifecycleResponse"

  /platform/tenants/{tenantId}/health:
    get:
      operationId: getPlatformTenantHealth
      tags: [platform]
      summary: Tenant operational health snapshot
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/TenantIdPath"
      responses:
        "200":
          description: Health
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /platform/tenants/{tenantId}/subscription:
    get:
      operationId: getPlatformTenantSubscription
      tags: [platform]
      summary: Get workspace subscription record
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/TenantIdPath"
      responses:
        "200":
          description: Subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSubscriptionResponse"
    post:
      operationId: createPlatformTenantSubscription
      tags: [platform]
      summary: Create workspace subscription
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/TenantIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSubscriptionResponse"
        "409":
          description: Already exists
    patch:
      operationId: updatePlatformTenantSubscription
      tags: [platform]
      summary: Update workspace subscription metadata
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/TenantIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSubscriptionResponse"

  /platform/tenants/{tenantId}/subscription/status:
    patch:
      operationId: updatePlatformTenantSubscriptionStatus
      tags: [platform]
      summary: Change subscription status with audit reason
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/TenantIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Status changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformSubscriptionResponse"

  /platform/tenants/{tenantId}/commercial-account:
    get:
      operationId: getPlatformTenantCommercialAccount
      tags: [platform, commercial]
      summary: Get commercial account for tenant
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/TenantIdPath"
      responses:
        "200":
          description: Commercial account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformCommercialAccountResponse"
    put:
      operationId: upsertPlatformTenantCommercialAccount
      tags: [platform, commercial]
      summary: Create or update commercial account
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/TenantIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformCommercialAccountResponse"

  /platform/tenants/{tenantId}/commercial-contacts:
    get:
      operationId: listPlatformTenantCommercialContacts
      tags: [platform, commercial]
      summary: List commercial billing contacts
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/TenantIdPath"
      responses:
        "200":
          description: Contacts
          content:
            application/json:
              schema:
                type: object
                properties:
                  contacts:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
    post:
      operationId: createPlatformTenantCommercialContact
      tags: [platform, commercial]
      summary: Add commercial billing contact
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/TenantIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /platform/tenants/{tenantId}/commercial-contacts/{contactId}:
    patch:
      operationId: updatePlatformTenantCommercialContact
      tags: [platform, commercial]
      summary: Update commercial contact
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/TenantIdPath"
        - $ref: "#/components/parameters/CommercialContactIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /platform/tenants/{tenantId}/commercial-contacts/{contactId}/primary:
    patch:
      operationId: setPlatformTenantCommercialContactPrimary
      tags: [platform, commercial]
      summary: Mark contact as primary billing contact
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/TenantIdPath"
        - $ref: "#/components/parameters/CommercialContactIdPath"
      responses:
        "200":
          description: Primary set
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /platform/tenants/{tenantId}/commercial-contracts:
    get:
      operationId: listPlatformTenantCommercialContracts
      tags: [platform, commercial]
      summary: List commercial contracts
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/TenantIdPath"
      responses:
        "200":
          description: Contracts
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
    post:
      operationId: createPlatformTenantCommercialContract
      tags: [platform, commercial]
      summary: Create commercial contract
      security: [{ bearerAuth: [] }]
      parameters:
        - $ref: "#/components/parameters/TenantIdPath"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "201":
          description: Created
          content:
