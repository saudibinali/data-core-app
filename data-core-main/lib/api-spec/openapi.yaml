          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # Governance Console (P6-D/P6-E)
  /governance/health:
    get:
      operationId: getGovernanceHealth
      tags: [governance]
      summary: Tenant health snapshot (workspace-scoped, admin only)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Tenant health summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceHealth"
        "403":
          description: Forbidden

  /governance/metrics:
    get:
      operationId: getGovernanceMetrics
      tags: [governance]
      summary: Operational execution metrics (workspace-scoped, admin only)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Operational metrics snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceMetrics"
        "403":
          description: Forbidden

  /governance/stuck:
    get:
      operationId: getGovernanceStuck
      tags: [governance]
      summary: Stuck executions list (workspace-scoped, admin only)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Stuck executions response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceStuck"
        "403":
          description: Forbidden

  /governance/alerts:
    get:
      operationId: getGovernanceAlerts
      tags: [governance]
      summary: Paginated governance alerts (workspace-scoped, admin only)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
          description: Page number (default 1)
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
          description: Alerts per page (max 50)
      responses:
        "200":
          description: Governance alerts page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceAlerts"
        "403":
          description: Forbidden

  /governance/events:
    post:
      operationId: postGovernanceEvents
      tags: [governance]
      summary: Emit a governance dashboard observability event (log-only, no DB writes)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GovernanceEventBody"
      responses:
        "204":
          description: Event logged
        "403":
          description: Forbidden

  /governance/snapshots:
    get:
      operationId: getGovernanceSnapshots
      tags: [governance]
      summary: Historical governance trend data (workspace-scoped, admin only)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: range
          schema:
            type: string
            enum: ["1h", "24h", "7d", "30d"]
            default: "24h"
          description: "Time range for trend query (1h / 24h / 7d / 30d)"
      responses:
        "200":
          description: Governance snapshot trend response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceSnapshotTrend"
        "400":
          description: Invalid range parameter
        "403":
          description: Forbidden

  /governance/snapshots/capture:
    post:
      operationId: postGovernanceSnapshotsCapture
      tags: [governance]
      summary: Capture a governance snapshot now (workspace-scoped, admin only)
      security: [{ bearerAuth: [] }]
      responses:
        "201":
          description: Snapshot captured and persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceCaptureResult"
        "403":
          description: Forbidden

  /governance/snapshots/chronic-alerts:
    get:
      operationId: getGovernanceSnapshotsChronicAlerts
      tags: [governance]
      summary: Alert frequency intelligence across historical snapshots (workspace-scoped, admin only)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: range
          schema:
            type: string
            enum: ["1h", "24h", "7d", "30d"]
            default: "7d"
          description: "Time range for frequency analysis"
      responses:
        "200":
          description: Chronic alert frequency analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GovernanceChronicAlerts"
        "400":
          description: Invalid range parameter
        "403":
          description: Forbidden

  # ── P7-D Governance Trend APIs ──────────────────────────────────────────────

  /governance/trends/severity:
    get:
      operationId: getGovernanceTrendsSeverity
      tags: [governance]
      summary: Severity timeline trend (workspace-scoped, admin only, query-cascade aware)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: range
          schema:
            type: string
            enum: ["1h", "24h", "7d", "30d", "90d", "180d", "365d"]
            default: "30d"
          description: "Time range: ≤30d uses raw snapshots, 31–90d uses hourly rollups, 91–365d uses daily rollups"
      responses:
        "200":
          description: Severity timeline trend response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeverityTrendResponse"
        "400":
          description: Invalid or out-of-range range parameter
        "403":
          description: Forbidden

  /governance/trends/error-rate:
    get:
      operationId: getGovernanceTrendsErrorRate
      tags: [governance]
      summary: Workflow error-rate trend (workspace-scoped, admin only, query-cascade aware)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: range
          schema:
            type: string
            enum: ["1h", "24h", "7d", "30d", "90d", "180d", "365d"]
            default: "30d"
          description: "Time range: ≤30d uses raw snapshots, 31–90d uses hourly rollups, 91–365d uses daily rollups"
      responses:
        "200":
          description: Error-rate trend response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NumericTrendResponse"
        "400":
          description: Invalid or out-of-range range parameter
        "403":
          description: Forbidden

  /governance/trends/backlogs:
    get:
      operationId: getGovernanceTrendsBacklogs
      tags: [governance]
      summary: Approval and delay backlog trend (workspace-scoped, admin only, query-cascade aware)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: range
          schema:
            type: string
            enum: ["1h", "24h", "7d", "30d", "90d", "180d", "365d"]
            default: "30d"
          description: "Time range: ≤30d uses raw snapshots, 31–90d uses hourly rollups, 91–365d uses daily rollups"
      responses:
        "200":
          description: Backlog trend response (approval backlog, delay backlog, stuck count)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacklogTrendResponse"
        "400":
          description: Invalid or out-of-range range parameter
        "403":
          description: Forbidden

  /governance/trends/storms:
    get:
      operationId: getGovernanceTrendsStorms
      tags: [governance]
      summary: Alert storm frequency trend (workspace-scoped, admin only, query-cascade aware)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: range
          schema:
            type: string
            enum: ["1h", "24h", "7d", "30d", "90d", "180d", "365d"]
            default: "30d"
          description: "Time range: ≤30d uses raw snapshots, 31–90d uses hourly rollups, 91–365d uses daily rollups"
      responses:
        "200":
          description: Storm frequency trend response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StormTrendResponse"
        "400":
          description: Invalid or out-of-range range parameter
        "403":
          description: Forbidden

components:
  parameters:
    IdempotencyKeyHeader:
      in: header
      name: Idempotency-Key
      required: false
      description: >
        Optional client-generated key (max 128 chars). Replays the same HTTP response
        for identical provision payloads within the workspace. Required for safe retries.
      schema:
        type: string
        maxLength: 128

    HrEmployeeIdPath:
      in: path
      name: id
      required: true
      schema: { type: integer }
    HrOrgUnitIdPath:
      in: path
      name: id
      required: true
      schema: { type: integer }
    HrJobGradeIdPath:
      in: path
      name: id
      required: true
      schema: { type: integer }
    HrJobTitleIdPath:
      in: path
      name: id
      required: true
      schema: { type: integer }
    LeaveRequestIdPath:
      in: path
      name: id
      required: true
      schema: { type: integer }
    ApprovalInstanceIdPath:
      in: path
      name: instanceId
      required: true
      schema: { type: integer }
    ApprovalStepIdPath:
      in: path
      name: stepId
      required: true
      schema: { type: integer }
    TenantIdPath:
      in: path
      name: tenantId
      required: true
      schema: { type: integer }
    PlatformUserIdPath:
      in: path
      name: userId
      required: true
      schema: { type: integer }
    CommercialContactIdPath:
      in: path
      name: contactId
      required: true
      schema: { type: integer }
    CommercialContractIdPath:
      in: path
      name: contractId
      required: true
      schema: { type: integer }
    CommercialInvoiceIdPath:
      in: path
      name: invoiceId
      required: true
      schema: { type: integer }
    PayrollEntityIdPath:
      in: path
      name: id
      required: true
      schema: { type: integer }
    PayrollRunIdPath:
      in: path
      name: runId
      required: true
      schema: { type: integer }
  schemas:
    # ── Governance Console schemas (P6-D/P6-E) ──────────────────────────────
    GovernanceAlertItem:
      type: object
      properties:
        code:                { type: string }
        severity:            { type: string, enum: [info, warning, critical] }
        title:               { type: string }
        description:         { type: string }
        affectedWorkflowIds:
          type: array
          items: { type: integer }
        affectedExecutionIds:
          type: array
          items: { type: integer }
        detectedAt:          { type: string, format: date-time }
        recommendedAction:   { type: string }

    GovernanceHealth:
      type: object
      properties:
        capturedAt:   { type: string, format: date-time }
        workspaceId:  { type: integer }
        severity:     { type: string, enum: [healthy, warning, degraded, critical] }
        indicators:
          type: object
          properties:
            executionPressure:  { type: string }
            errorConcentration: { type: string }
            approvalPressure:   { type: string }
            delayPressure:      { type: string }
            stormPressure:      { type: string }
        alerts:
          type: array
          items: { $ref: "#/components/schemas/GovernanceAlertItem" }
        stuckExecutionCount: { type: integer }
        stormSeverity:       { type: string, enum: [none, warning, critical] }
        metrics:
          type: object
          properties:
            activeExecutions:           { type: integer }
            waitingApprovalCount:       { type: integer }
            waitingDelayCount:          { type: integer }
            approvalBacklogCount:       { type: integer }
            delayBacklogCount:          { type: integer }
            workflowErrorRate:          { type: number }
            averageExecutionDurationMs: { type: number }

    GovernanceMetrics:
      type: object
      properties:
        capturedAt:  { type: string, format: date-time }
        workspaceId: { type: integer }
        counts:
          type: object
          properties:
            active:          { type: integer }
            waitingApproval: { type: integer }
            waitingDelay:    { type: integer }
            completed:       { type: integer }
            failed:          { type: integer }
            timedOut:        { type: integer }
            cancelled:       { type: integer }
        backlog:
          type: object
          properties:
            approvalBacklogCount: { type: integer }
            delayBacklogCount:    { type: integer }
        performance:
          type: object
          properties:
            averageExecutionDurationMs: { type: number }
            workflowErrorRate:          { type: number }

    GovernanceStuckItem:
      type: object
      properties:
        executionId:     { type: integer }
        workflowId:      { type: integer }
        status:          { type: string }
        stuckReason:     { type: string, enum: [running_too_long, approval_overdue, delay_overdue] }
        stuckDurationMs: { type: number }
        overdueMs:       { type: number }
        severity:        { type: string, enum: [warning, critical] }

    GovernanceStuck:
      type: object
      properties:
        capturedAt: { type: string, format: date-time }
        total:      { type: integer }
        truncated:  { type: boolean }
        limit:      { type: integer }
        data:
          type: array
          items: { $ref: "#/components/schemas/GovernanceStuckItem" }

    GovernanceAlerts:
      type: object
      properties:
        capturedAt: { type: string, format: date-time }
        total:      { type: integer }
        page:       { type: integer }
        limit:      { type: integer }
        data:
          type: array
          items: { $ref: "#/components/schemas/GovernanceAlertItem" }

    GovernanceEventBody:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum:
            - governance_dashboard_loaded
            - governance_dashboard_refreshed
            - governance_alert_viewed
            - governance_stuck_table_viewed
            - historical_dashboard_loaded
            - historical_dashboard_range_changed
            - historical_chart_rendered
            - historical_truncation_warning_shown
        visibleAlertCount: { type: integer }
        visibleStuckCount: { type: integer }
        dashboardSeverity: { type: string }

    # ── Governance History schemas (P7-A) ─────────────────────────────────────
    GovernanceNumberPoint:
      type: object
      properties:
        capturedAt: { type: string, format: date-time }
        value:      { type: number }

    GovernanceSeverityPoint:
      type: object
      properties:
        capturedAt: { type: string, format: date-time }
        severity:   { type: string }

    GovernanceSnapshotTrend:
      type: object
      properties:
        range:         { type: string, enum: ["1h", "24h", "7d", "30d"] }
        capturedAt:    { type: string, format: date-time }
        snapshotCount: { type: integer }
        firstAt:       { type: string, format: date-time, nullable: true }
        lastAt:        { type: string, format: date-time, nullable: true }
        severityHistory:
          type: array
          items: { $ref: "#/components/schemas/GovernanceSeverityPoint" }
        errorRateTrend:
          type: array
          items: { $ref: "#/components/schemas/GovernanceNumberPoint" }
        approvalBacklogTrend:
          type: array
          items: { $ref: "#/components/schemas/GovernanceNumberPoint" }
        delayBacklogTrend:
          type: array
          items: { $ref: "#/components/schemas/GovernanceNumberPoint" }
        stuckCountTrend:
          type: array
          items: { $ref: "#/components/schemas/GovernanceNumberPoint" }

    GovernanceCaptureResult:
      type: object
      properties:
        snapshotId:    { type: integer }
        workspaceId:   { type: integer }
        capturedAt:    { type: string, format: date-time }
        severity:      { type: string, enum: [healthy, warning, degraded, critical] }
        stuckCount:    { type: integer }
        stormSeverity: { type: string, enum: [none, warning, critical] }
        alertCodes:
          type: array
          items: { type: string }

    GovernanceAlertFrequencyEntry:
      type: object
      properties:
        code:           { type: string }
        count:          { type: integer }
        totalSnapshots: { type: integer }
        frequencyPct:   { type: number }
        firstSeenAt:    { type: string, format: date-time }
        lastSeenAt:     { type: string, format: date-time }
        isChronic:      { type: boolean }

    GovernanceChronicAlerts:
      type: object
      properties:
        range:         { type: string, enum: ["1h", "24h", "7d", "30d"] }
        capturedAt:    { type: string, format: date-time }
        snapshotCount: { type: integer }
        chronicCount:  { type: integer }
        items:
          type: array
          items: { $ref: "#/components/schemas/GovernanceAlertFrequencyEntry" }

    # ── P7-D Trend API point DTOs ─────────────────────────────────────────────

    SeverityTrendPoint:
      type: object
      properties:
        timestamp:   { type: string, format: date-time }
        severity:    { type: string, enum: [healthy, warning, degraded, critical] }
        sourceLayer: { type: string, enum: [raw, hourly, daily] }
      required: [timestamp, severity, sourceLayer]

    NumericTrendPoint:
      type: object
      properties:
        timestamp:   { type: string, format: date-time }
        value:       { type: number }
        sourceLayer: { type: string, enum: [raw, hourly, daily] }
      required: [timestamp, value, sourceLayer]

    BacklogTrendPoint:
      type: object
      properties:
        timestamp:       { type: string, format: date-time }
        approvalBacklog: { type: number }
        delayBacklog:    { type: number }
        stuckCount:      { type: number }
        sourceLayer:     { type: string, enum: [raw, hourly, daily] }
      required: [timestamp, approvalBacklog, delayBacklog, stuckCount, sourceLayer]

    StormTrendPoint:
      type: object
      properties:
        timestamp:        { type: string, format: date-time }
        stormFrequency:   { type: number, minimum: 0, maximum: 1 }
        dominantSeverity: { type: string, enum: [healthy, warning, degraded, critical] }
        sourceLayer:      { type: string, enum: [raw, hourly, daily] }
      required: [timestamp, stormFrequency, dominantSeverity, sourceLayer]

    # ── P7-D Trend API response envelopes ─────────────────────────────────────

    SeverityTrendResponse:
      type: object
      properties:
        range:       { type: string }
        rangeDays:   { type: number }
        sourceLayer: { type: string, enum: [raw, hourly, daily] }
        pointCount:  { type: integer }
        truncated:   { type: boolean }
        points:
          type: array
          items: { $ref: "#/components/schemas/SeverityTrendPoint" }
      required: [range, rangeDays, sourceLayer, pointCount, truncated, points]

    NumericTrendResponse:
      type: object
      properties:
        range:       { type: string }
        rangeDays:   { type: number }
        sourceLayer: { type: string, enum: [raw, hourly, daily] }
        pointCount:  { type: integer }
        truncated:   { type: boolean }
        points:
          type: array
          items: { $ref: "#/components/schemas/NumericTrendPoint" }
      required: [range, rangeDays, sourceLayer, pointCount, truncated, points]

    BacklogTrendResponse:
      type: object
      properties:
        range:       { type: string }
        rangeDays:   { type: number }
        sourceLayer: { type: string, enum: [raw, hourly, daily] }
        pointCount:  { type: integer }
        truncated:   { type: boolean }
        points:
          type: array
          items: { $ref: "#/components/schemas/BacklogTrendPoint" }
      required: [range, rangeDays, sourceLayer, pointCount, truncated, points]

    StormTrendResponse:
      type: object
      properties:
        range:       { type: string }
        rangeDays:   { type: number }
        sourceLayer: { type: string, enum: [raw, hourly, daily] }
        pointCount:  { type: integer }
        truncated:   { type: boolean }
        points:
          type: array
          items: { $ref: "#/components/schemas/StormTrendPoint" }
      required: [range, rangeDays, sourceLayer, pointCount, truncated, points]

    # ── Setup ────────────────────────────────────────────────────────────────
    SetupStatus:
      type: object
      required: [initialized]
      properties:
        initialized:
          type: boolean

    SetupInitializeBody:
      type: object
      required: [fullName, email, employeeNumber, password]
      properties:
        fullName:
          type: string
        email:
          type: string
          format: email
        employeeNumber:
          type: string
        password:
          type: string

    SetupInitializeResponse:
      type: object
      required: [accessToken, userId]
      properties:
        accessToken:
          type: string
        userId:
          type: integer

    DeleteManyNotificationsBody:
      type: object
      required: [ids]
      properties:
        ids:
          type: array
          items:
            type: integer

    WorkflowDefinition:
      type: object
      required: [id, workspaceId, key, name, module, triggerEvent, isActive, status, conditions, steps, version, createdAt, updatedAt]
      properties:
        id:
          type: integer
        workspaceId:
          type: integer
        key:
          type: string
        name:
          type: string
        nameAr:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        descriptionAr:
          type: ["string", "null"]
        module:
          type: string
        triggerEvent:
          type: string
        isActive:
          type: boolean
        status:
          type: string
          enum: [draft, active, deprecated, archived]
          description: |
            Governance lifecycle state (Phase 3).
            draft       — Created or being edited. Engine ignores draft workflows.
            active      — Validated and live. Receives trigger events. IMMUTABLE via PATCH.
            deprecated  — Disabled manually. Engine ignores. History preserved.
            archived    — Soft-deleted. Engine ignores. deletedAt is set.
        version:
          type: integer
          description: |
            P5-E: Monotonically increasing publish version counter.
            0 = never published. 1 = first publish. Increments on every POST /activate.
        currentVersionId:
          type: ["integer", "null"]
          description: ID of the currently active workflow_definition_versions row. NULL if not active.
        publishedAt:
          type: ["string", "null"]
          description: When the workflow was last published (denormalized from current version row).
        publishedBy:
          type: ["integer", "null"]
          description: User ID who last published the workflow.
        conditions:
          type: object
          additionalProperties: true
        steps:
          type: array
          items:
            type: object
            additionalProperties: true
        executionCount:
          type: integer
        lastExecutedAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
        archivedAt:
          type: ["string", "null"]
          description: Set when status transitions to 'archived'.
        deletedAt:
          type: ["string", "null"]
          description: Set by soft-delete (DELETE /workflows/:id). NULL = not deleted.
    PublishWorkflowBody:
      type: object
      properties:
        changeNotes:
          type: string
          description: |
            Optional human-written description of what changed in this version.
            Stored in the immutable version row. Visible in GET /workflows/:id/versions.
            Examples: "Fixed email template", "Changed approver to director".
    WorkflowPublishResult:
      type: object
      required: [workflowId, status, valid, errors, warnings]
      properties:
        workflowId:
          type: integer
        status:
          type: string
          enum: [draft, active, deprecated, archived]
        valid:
          type: boolean
          description: true if governance validation passed; false if errors blocked publish.
        alreadyActive:
          type: boolean
          description: Only present when workflow was already active (idempotent call).
        version:
          type: integer
          description: The newly assigned version number (absent if alreadyActive or validation failed).
        versionId:
          type: integer
          description: DB row ID of the newly created version record.
        publishedAt:
          type: string
          description: ISO timestamp of when this version was published.
        publishedBy:
          type: ["integer", "null"]
          description: User ID who published this version.
        changeNotes:
          type: ["string", "null"]
          description: Admin-provided publish notes (from request body).
        errors:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowValidationError"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowValidationWarning"
        notices:
          type: array
          items:
            type: object
            additionalProperties: true
        estimatedMetrics:
          type: object
          additionalProperties: true
        error:
          type: string
          description: Top-level error message (only present on 422 responses).
    WorkflowDefinitionVersion:
      type: object
      required: [id, definitionId, workspaceId, version, triggerEvent, name, publishedAt]
      properties:
        id:
          type: integer
        definitionId:
          type: integer
        workspaceId:
          type: integer
        version:
          type: integer
          description: Monotonically increasing publish number. First publish = 1.
        triggerEvent:
          type: string
          description: Trigger event string frozen at publish time.
        name:
          type: string
          description: Workflow display name frozen at publish time.
        nameAr:
          type: ["string", "null"]
        changeNotes:
          type: ["string", "null"]
          description: Admin-provided notes describing what changed in this version.
        publishedBy:
          type: ["integer", "null"]
        publishedByName:
          type: ["string", "null"]
          description: Display name of the user who published this version.
        publishedAt:
          type: string
          description: ISO timestamp of when this version was published. Never updated.
        deactivatedAt:
          type: ["string", "null"]
          description: When this version was superseded or the workflow was deprecated. NULL = still active.
        deactivatedBy:
          type: ["integer", "null"]
        validationSummary:
          type: ["object", "null"]
          additionalProperties: true
          description: Governance validation result captured at publish time.
        stepCount:
          type: integer
          description: Number of steps in this version's frozen configuration.
    WorkflowVersionHistory:
      type: object
      required: [workflowId, workflowName, versions]
      properties:
        workflowId:
          type: integer
        workflowName:
          type: string
        versions:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowDefinitionVersion"
    WorkflowComparativeIntelligence:
      type: object
      required:
        - workflowId
        - workflowName
        - stepCount
        - comparativeRiskScore
        - runtimeWeightedComplexity
        - projectedComplexity
        - fragilityLevel
        - trendDirection
        - hotspotCount
        - operationalPriority
        - workspaceRank
        - confidenceLevel
      properties:
        workflowId:
          type: integer
          description: "Workflow definition primary key."
        workflowName:
          type: string
        stepCount:
          type: integer
        comparativeRiskScore:
          type: integer
          minimum: 0
          maximum: 100
          description: |
            Composite risk score (0–100).
            base = rWC × 0.35 + projectedComplexity × 0.25
            + trendBonus + fragilityBonus + hotspotBonus
            × confidenceMultiplier
        runtimeWeightedComplexity:
          type: integer
          minimum: 0
          maximum: 100
          description: "P8-C runtimeWeightedComplexity (current state)."
        projectedComplexity:
          type: integer
          minimum: 0
          maximum: 100
          description: "P8-D projectedComplexity at end of 7-day forecast window."
        fragilityLevel:
          type: string
          enum: [low, moderate, high, critical]
          description: "P8-C operational fragility level."
        trendDirection:
          type: string
          enum: [improving, stable, degrading, critically_degrading]
          description: "P8-D trend direction from rWC slope."
        hotspotCount:
          type: integer
          minimum: 0
          description: "Number of chronic operational hotspots from P8-C."
        operationalPriority:
          type: string
          enum: [informational, watch, elevated, urgent, critical]
          description: |
            5-level operational triage priority.
            Base: informational (<15) | watch (≥15) | elevated (≥35) | urgent (≥55) | critical (≥75).
            Escalated by +1 if trend=critically_degrading OR fragility=critical (score ≥ 10).
        workspaceRank:
          type: integer
          minimum: 1
          description: "1-based rank within the workspace (1 = highest risk)."
        confidenceLevel:
          type: string
          enum: [low, moderate, high]
          description: "P8-D forecast confidence (low confidence reduces comparativeRiskScore)."
    WorkspaceHotspotConcentration:
      type: object
      required:
        - dominantWorkflowCount
        - concentrationRatio
        - chronicHotspotWorkflowCount
        - criticallyDegradingCount
        - urgentOrCriticalCount
        - topRiskWorkflowId
        - topRiskScore
      properties:
        dominantWorkflowCount:
          type: integer
          description: "Workflows with comparativeRiskScore ≥ 70."
        concentrationRatio:
          type: number
          minimum: 0
          maximum: 1
          description: "dominantWorkflowCount / totalWorkflows (0–1)."
        chronicHotspotWorkflowCount:
          type: integer
          description: "Workflows with ≥ 2 chronic operational hotspots from P8-C."
        criticallyDegradingCount:
          type: integer
          description: "Workflows with trendDirection = 'critically_degrading'."
        urgentOrCriticalCount:
          type: integer
          description: "Workflows with operationalPriority = 'urgent' or 'critical'."
        topRiskWorkflowId:
          type: integer
          nullable: true
          description: "workflowId of rank-1 workflow, null if no workflows."
        topRiskScore:
          type: integer
          minimum: 0
          maximum: 100
          description: "comparativeRiskScore of rank-1 workflow (0 if no workflows)."
    WorkflowComparativeRankingResponse:
      type: object
      required:
        - workspaceId
        - totalWorkflows
        - rankedWorkflows
        - hotspotConcentration
        - computedAt
      properties:
        workspaceId:
          type: integer
        totalWorkflows:
          type: integer
        rankedWorkflows:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowComparativeIntelligence"
          description: "Workflows sorted by workspaceRank ASC (rank 1 = highest risk)."
        hotspotConcentration:
          $ref: "#/components/schemas/WorkspaceHotspotConcentration"
        computedAt:
          type: string
          format: date-time
          description: "ISO 8601 timestamp when the ranking was computed."
    GovernanceSignal:
      type: object
      required:
        - signalCode
        - severity
        - category
        - affectedWorkflowId
        - workspaceId
        - advisoryMessage
        - supportingIndicators
        - generatedAt
        - expiresAt
      properties:
        signalCode:
          type: string
          enum:
            - GOV-WORKFLOW-CRITICAL
            - GOV-WORKFLOW-URGENT
            - GOV-WORKFLOW-ESCALATING
            - GOV-HOTSPOT-CONCENTRATION
            - GOV-FRAGILITY-GROWTH
            - GOV-STORM-RISK-GROWTH
          description: "Machine-readable governance signal identifier."
        severity:
          type: string
          enum: [low, medium, high, critical]
          description: "Operational severity of the signal."
        category:
          type: string
          enum:
            - operational_priority
            - degradation
            - fragility
            - hotspot_concentration
            - storm_risk
          description: "Governance concern category."
        affectedWorkflowId:
          type: integer
          nullable: true
          description: |
            Workflow definition primary key for workflow-scoped signals.
            null for workspace-level signals (e.g. GOV-HOTSPOT-CONCENTRATION).
        workspaceId:
          type: integer
        advisoryMessage:
          type: string
          description: |
            Deterministic human-readable advisory message.
            Template-based, never AI-generated.
        supportingIndicators:
          type: array
          items:
            type: string
          description: |
            Named metric indicators that triggered the signal.
            Each entry is in "metric:value" format.
        generatedAt:
          type: string
          format: date-time
          description: "ISO 8601 timestamp when this signal was generated."
        expiresAt:
          type: string
          format: date-time
          description: |
            ISO 8601 expiry timestamp. Signal is considered stale after this time.
            TTL per code: CRITICAL=60min, URGENT=120min, ESCALATING=240min,
            FRAGILITY=360min, CONCENTRATION=240min, STORM=480min.
    WorkflowGovernanceSignalResponse:
      type: object
      required:
        - workspaceId
        - signals
        - advisoryLevel
        - totalSignals
        - deduplicatedCount
        - evaluatedAt
      properties:
        workspaceId:
          type: integer
        signals:
          type: array
          items:
            $ref: "#/components/schemas/GovernanceSignal"
          description: |
            Emitted governance signals sorted by severity DESC then signalCode ASC.
            Advisory-only — never implies automatic action.
        advisoryLevel:
          type: string
          enum: [informational, advisory, elevated, urgent, critical]
          description: |
            Worst advisory level across all emitted signals.
            Derived from worst signal severity:
              critical → critical | high → urgent | medium → elevated | low → advisory | none → informational
        totalSignals:
          type: integer
          minimum: 0
          description: "Count of signals successfully emitted after deduplication."
        deduplicatedCount:
          type: integer
          minimum: 0
          description: |
            Count of candidate signals suppressed by deduplication
            (within-evaluation duplicates + external cooldown suppressions).
        evaluatedAt:
          type: string
          format: date-time
          description: "ISO 8601 timestamp when the governance signal evaluation ran."
    WorkflowMetricProjection:
      type: object
      required: [currentValue, projectedValue, slope, volatility]
      properties:
        currentValue:
          type: number
          description: "Most recent observed value in the series."
        projectedValue:
          type: number
          description: "Forecasted value at the end of the projection window."
        slope:
          type: number
          description: "Weighted rate of change per time-period."
        volatility:
          type: number
          description: "Standard deviation of the series (unweighted)."
    WorkflowForecastMetrics:
      type: object
      required: [errorRate, backlog, stormRisk, complexity]
      properties:
        errorRate:  { $ref: "#/components/schemas/WorkflowMetricProjection" }
        backlog:    { $ref: "#/components/schemas/WorkflowMetricProjection" }
        stormRisk:  { $ref: "#/components/schemas/WorkflowMetricProjection" }
        complexity: { $ref: "#/components/schemas/WorkflowMetricProjection" }
    WorkflowOperationalForecast:
      type: object
      required: [projectedComplexity, projectedFragility, projectedBacklogPressure, projectedStormRisk, trendDirection, confidenceLevel, forecastWindowDays, projectionMethod, metrics]
      properties:
        projectedComplexity:
          type: integer
          minimum: 0
          maximum: 100
          description: "Projected runtimeWeightedComplexity at end of forecast window (0–100)."
        projectedFragility:
          type: number
          minimum: 0
          maximum: 1
          description: "Projected operational fragility (projectedComplexity / 100)."
        projectedBacklogPressure:
          type: number
          minimum: 0
          maximum: 1
          description: "Projected combined approval + delay backlog pressure (0–1)."
        projectedStormRisk:
          type: number
          minimum: 0
          maximum: 1
          description: "Projected storm risk (projected stormFrequency, 0–1)."
        trendDirection:
          type: string
          enum: [improving, stable, degrading, critically_degrading]
        confidenceLevel:
          type: string
          enum: [low, moderate, high]
        forecastWindowDays:
          type: integer
          description: "Projection window used (days)."
        projectionMethod:
          type: string
          enum: [no_data, last_known_value, weighted_moving_average, weighted_linear_regression]
        metrics:
          $ref: "#/components/schemas/WorkflowForecastMetrics"
    WorkflowForecastResponse:
      type: object
      required: [workflowId, workflowName, stepCount, granularity, lookbackDays, dataPointsUsed, forecast]
      properties:
        workflowId:     { type: integer }
        workflowName:   { type: string }
        stepCount:      { type: integer }
        granularity:    { type: string, enum: [daily, hourly] }
        lookbackDays:   { type: integer }
        dataPointsUsed: { type: integer }
        forecast:       { $ref: "#/components/schemas/WorkflowOperationalForecast" }
    WorkflowOperationalCorrelation:
      type: object
      required: [structuralComplexity, historicalErrorPressure, historicalBacklogPressure, approvalLatencyPressure, delayDurationPressure, executionFailurePressure, chronicOperationalHotspots, runtimeWeightedComplexity, correlationClassification]
      properties:
        structuralComplexity:
          type: integer
          minimum: 0
          maximum: 100
          description: "Static structural complexity score from P8-B (0–100)."
        historicalErrorPressure:
          type: number
          minimum: 0
          maximum: 1
          description: "Historical mean error rate from governance snapshots (0–1)."
        historicalBacklogPressure:
          type: number
          minimum: 0
          maximum: 1
          description: "Combined normalized approval + delay backlog pressure (0–1)."
        approvalLatencyPressure:
          type: number
          minimum: 0
          maximum: 1
          description: "Approval backlog × approval density amplification (0–1). Zero if no approval steps."
        delayDurationPressure:
          type: number
          minimum: 0
          maximum: 1
          description: "Delay backlog × delay density amplification (0–1). Zero if no delay steps."
        executionFailurePressure:
          type: number
          minimum: 0
          maximum: 1
          description: "Composite failure pressure: errorRate × 0.7 + stuckCount × 0.3 (0–1)."
        chronicOperationalHotspots:
          type: array
          items: { type: string }
          description: "Named chronic operational hotspot categories detected."
        runtimeWeightedComplexity:
          type: integer
          minimum: 0
          maximum: 100
          description: "Runtime-weighted complexity blending static + historical signals (0–100)."
        correlationClassification:
          type: string
          enum:
            - structurally_simple_operationally_stable
            - structurally_complex_operationally_stable
            - structurally_simple_operationally_fragile
            - structurally_and_operationally_complex
    OperationalFragilityIndex:
      type: object
      required: [level, structuralFragility, runtimeFragility, chronicity, operationalConfidence, indicators]
      properties:
        level:
          type: string
          enum: [low, moderate, high, critical]
        structuralFragility:
          type: number
          minimum: 0
          maximum: 1
          description: "Structural complexity / 100 (0–1)."
        runtimeFragility:
          type: number
          minimum: 0
          maximum: 1
          description: "Mean of historicalErrorPressure, approvalLatencyPressure, delayDurationPressure (0–1)."
        chronicity:
          type: number
          minimum: 0
          maximum: 1
          description: "Persistence of operational issues based on dominantSeverity, chronicAlertCodes, stormFrequency (0–1)."
        operationalConfidence:
          type: string
          enum: [low, moderate, high]
          description: "Confidence level based on snapshotCount."
        indicators:
          type: array
          items: { type: string }
          description: "Named frailty indicator codes."
    WorkflowOperationalHistoricalSummary:
      type: object
      required: [snapshotCount, dominantSeverity, windowDays]
      properties:
        snapshotCount:    { type: integer }
        dominantSeverity: { type: string }
        windowDays:       { type: integer }
    WorkflowOperationalResponse:
      type: object
      required: [workflowId, workflowName, stepCount, correlation, fragility, historical]
      properties:
        workflowId:   { type: integer }
        workflowName: { type: string }
        stepCount:    { type: integer }
        correlation:  { $ref: "#/components/schemas/WorkflowOperationalCorrelation" }
        fragility:    { $ref: "#/components/schemas/OperationalFragilityIndex" }
        historical:   { $ref: "#/components/schemas/WorkflowOperationalHistoricalSummary" }
    WorkflowNodeDependencySummary:
      type: object
      required: [stepIndex, stepName, stepType, inDegree, outDegree, upstreamCount, downstreamCount]
      properties:
        stepIndex:       { type: integer }
        stepName:        { type: string }
        stepType:        { type: string }
        inDegree:        { type: integer, description: "Number of direct predecessor nodes." }
        outDegree:       { type: integer, description: "Number of direct successor nodes." }
        upstreamCount:   { type: integer, description: "Total nodes that can reach this node." }
        downstreamCount: { type: integer, description: "Total nodes reachable from this node." }
    WorkflowConvergenceNode:
      type: object
      required: [stepIndex, stepName, stepType, inDegree]
      properties:
        stepIndex: { type: integer }
        stepName:  { type: string }
        stepType:  { type: string }
        inDegree:  { type: integer, description: "Number of distinct direct predecessors (≥2)." }
    WorkflowBottleneckNode:
      type: object
      required: [stepIndex, stepName, stepType, score, reasons]
      properties:
        stepIndex: { type: integer }
        stepName:  { type: string }
        stepType:  { type: string }
        score:     { type: number, description: "Composite bottleneck score." }
        reasons:
          type: array
          items: { type: string }
    WorkflowDependencyGraph:
      type: object
      required: [nodeSummaries, convergenceNodes, divergenceNodes, bottleneckNodes, conditionalNodes, synchronizationCandidates]
      properties:
        nodeSummaries:
          type: array
          items: { $ref: "#/components/schemas/WorkflowNodeDependencySummary" }
        convergenceNodes:
          type: array
          items: { $ref: "#/components/schemas/WorkflowConvergenceNode" }
        divergenceNodes:
          type: array
          items: { type: integer }
          description: "stepIndex(es) of divergence (branching) nodes."
        bottleneckNodes:
          type: array
          items: { $ref: "#/components/schemas/WorkflowBottleneckNode" }
        conditionalNodes:
          type: array
          items: { type: integer }
          description: "stepIndex(es) of condition steps."
        synchronizationCandidates:
          type: array
          items: { type: integer }
          description: "Convergence nodes with approval/delay predecessors."
    ExecutionPressureEstimate:
      type: object
      required: [estimatedFanoutPressure, approvalWaitPressure, delayAccumulationPressure, dependencyCriticality, operationalComplexityScore]
      properties:
        estimatedFanoutPressure:    { type: number, minimum: 0, maximum: 1 }
        approvalWaitPressure:       { type: number, minimum: 0, maximum: 1 }
        delayAccumulationPressure:  { type: number, minimum: 0, maximum: 1 }
        dependencyCriticality:      { type: number, minimum: 0, maximum: 1 }
        operationalComplexityScore: { type: integer, minimum: 0, maximum: 100 }
    DependencyRiskReason:
      type: object
      required: [code, message]
      properties:
        code:    { type: string }
        message: { type: string }
    DependencyRiskAssessment:
      type: object
      required: [level, bottleneckRisk, convergenceComplexity, operationalFragilityIndicators, reasons]
      properties:
        level:
          type: string
          enum: [low, moderate, high, critical]
        bottleneckRisk:
          type: string
          enum: [none, low, moderate, high]
        convergenceComplexity:
          type: string
          enum: [none, low, moderate, high]
        operationalFragilityIndicators:
          type: array
          items: { type: string }
        reasons:
          type: array
          items: { $ref: "#/components/schemas/DependencyRiskReason" }
    WorkflowDependencyResponse:
      type: object
      required: [workflowId, workflowName, stepCount, dependencyGraph, pressure, risk]
      properties:
        workflowId:      { type: integer }
        workflowName:    { type: string }
        stepCount:       { type: integer }
        dependencyGraph: { $ref: "#/components/schemas/WorkflowDependencyGraph" }
        pressure:        { $ref: "#/components/schemas/ExecutionPressureEstimate" }
        risk:            { $ref: "#/components/schemas/DependencyRiskAssessment" }
    WorkflowTopologyNode:
      type: object
      required: [stepIndex, stepName, stepType, arrayPos]
      properties:
        stepIndex:
          type: integer
          description: Logical step.index from the workflow definition.
        stepName:
          type: string
        stepType:
          type: string
        arrayPos:
          type: integer
          description: 0-based position in the steps array.
    WorkflowTopologyEdge:
      type: object
      required: [fromIndex, toIndex, label]
      properties:
        fromIndex:
          type: integer
          description: stepIndex of the source node.
        toIndex:
          type: integer
          description: stepIndex of the target node.
        label:
          type: string
          enum: [linear, true_branch, false_branch]
    WorkflowTopologyGraph:
      type: object
      required:
        [nodes, edges, entryPoints, terminalNodes, branchingNodes,
         approvalNodes, delayNodes, unreachableNodes, isolatedSubgraphs]
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowTopologyNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowTopologyEdge"
        entryPoints:
          type: array
          items: { type: integer }
          description: stepIndex(es) that can start the workflow.
        terminalNodes:
          type: array
          items: { type: integer }
          description: stepIndex(es) of nodes with no outgoing edges (reachable from entry).
        branchingNodes:
          type: array
          items: { type: integer }
          description: stepIndex(es) of condition steps with ≥2 distinct outgoing targets.
        approvalNodes:
          type: array
          items: { type: integer }
          description: stepIndex(es) of approval steps.
        delayNodes:
          type: array
          items: { type: integer }
          description: stepIndex(es) of delay steps.
        unreachableNodes:
          type: array
          items: { type: integer }
          description: stepIndex(es) not reachable from the entry node by any path.
        isolatedSubgraphs:
          type: array
          items:
            type: array
            items: { type: integer }
          description: |
            Connected components (by stepIndex) disconnected from the main component.
            Steps in isolated subgraphs can never execute.
    WorkflowTopologyAnalytics:
      type: object
      required:
        [nodeCount, edgeCount, maxBranchDepth, longestPathEstimate,
         branchingFactor, approvalDensity, delayDensity, terminalPathCount,
         unreachableCount, isolatedSubgraphCount, conditionallyExecutedCount]
      properties:
        nodeCount:
          type: integer
        edgeCount:
          type: integer
        maxBranchDepth:
          type: integer
          description: Longest consecutive run of condition steps on any path from entry.
        longestPathEstimate:
          type: integer
          description: Maximum step count on any path from entry to any terminal node.
        branchingFactor:
          type: number
          description: |
            Average outgoing-edge count per branching node.
            1.0 when no branching nodes exist (linear flow). 0.0 for empty workflow.
        approvalDensity:
          type: number
          description: approvalNodes / nodeCount (0 when no nodes).
        delayDensity:
          type: number
          description: delayNodes / nodeCount (0 when no nodes).
        terminalPathCount:
          type: integer
          description: Estimated distinct execution paths from entry to terminal (capped at 1024).
        unreachableCount:
          type: integer
        isolatedSubgraphCount:
          type: integer
        conditionallyExecutedCount:
          type: integer
          description: Reachable nodes executed on some but not all paths.
    WorkflowTopologyRiskReason:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Stable machine-readable risk code (e.g. TOPO-SIZE-HIGH).
        message:
          type: string
          description: Human-readable explanation of the risk finding.
    WorkflowTopologyRiskAssessment:
      type: object
      required: [level, reasons, dominantDrivers]
      properties:
        level:
          type: string
          enum: [low, moderate, high, critical]
        reasons:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowTopologyRiskReason"
        dominantDrivers:
          type: array
          items: { type: string }
          description: Codes of the highest-severity contributing risk factors.
    WorkflowTopologyResponse:
      type: object
      required: [workflowId, workflowName, stepCount, graph, analytics, risk]
      properties:
        workflowId:
          type: integer
        workflowName:
          type: string
        stepCount:
          type: integer
        graph:
          $ref: "#/components/schemas/WorkflowTopologyGraph"
        analytics:
          $ref: "#/components/schemas/WorkflowTopologyAnalytics"
        risk:
          $ref: "#/components/schemas/WorkflowTopologyRiskAssessment"
    WorkflowValidationResult:
      type: object
      required: [workflowId, status, valid, errors, warnings]
      properties:
        workflowId:
          type: integer
        status:
          type: string
          enum: [draft, active, deprecated, archived]
        valid:
          type: boolean
          description: true if no errors found; false if at least one error blocks activation.
        alreadyActive:
          type: boolean
          description: Only present on POST /activate when workflow is already active.
        errors:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowValidationError"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowValidationWarning"
        error:
          type: string
          description: Top-level error message (only present on 422 responses).
    WorkflowValidationError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: "Machine-readable error code. Format: <WG-REF>_<DESCRIPTION>"
        message:
          type: string
          description: Human-readable explanation for the admin UI.
        stepIndex:
          type: ["integer", "null"]
        stepName:
          type: ["string", "null"]
        stepType:
          type: ["string", "null"]
    WorkflowValidationWarning:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        stepIndex:
          type: ["integer", "null"]
        stepName:
          type: ["string", "null"]
        stepType:
          type: ["string", "null"]
    WorkflowDetail:
      type: object
      required: [workflow, recentExecutions]
      properties:
        workflow:
          $ref: "#/components/schemas/WorkflowDefinition"
        recentExecutions:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowExecution"
    CreateWorkflowBody:
      type: object
      required: [name, triggerEvent, module, steps]
      properties:
        name:
          type: string
        nameAr:
          type: string
        description:
          type: string
        descriptionAr:
          type: string
        module:
          type: string
        triggerEvent:
          type: string
        conditions:
          type: object
          additionalProperties: true
        steps:
          type: array
          items:
            type: object
            additionalProperties: true
        isActive:
          type: boolean
    UpdateWorkflowBody:
      type: object
      properties:
        name:
          type: string
        nameAr:
          type: string
        description:
          type: string
        descriptionAr:
          type: string
        status:
          type: string
          enum: [draft, deprecated]
          description: |
            Allowed status transitions via PATCH (Phase 3):
            - draft → deprecated
            - deprecated → draft
            - active → deprecated (deactivation)
            Activation (→ active) must use POST /workflows/{id}/activate.
        conditions:
          type: object
          additionalProperties: true
        steps:
          type: array
          items:
            type: object
            additionalProperties: true
    WorkflowExecution:
      type: object
      required: [id, workspaceId, workflowId, status, currentStepIndex, context, startedAt]
      properties:
        id:
          type: integer
        workspaceId:
          type: integer
        workflowId:
          type: integer
        workflowName:
          type: ["string", "null"]
        workflowKey:
          type: ["string", "null"]
        triggeredBy:
          type: ["integer", "null"]
        triggeredByName:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, running, waiting_approval, completed, failed, cancelled]
        currentStepIndex:
          type: integer
        totalSteps:
          type: integer
        context:
          type: object
          additionalProperties: true
        error:
          type: ["string", "null"]
        startedAt:
          type: string
        completedAt:
          type: ["string", "null"]
    WorkflowExecutionStep:
      type: object
      required: [id, executionId, stepIndex, stepType, stepName, status]
      properties:
        id:
          type: integer
        executionId:
          type: integer
        stepIndex:
          type: integer
        stepType:
          type: string
        stepName:
          type: string
